# GitHub Actions Workflow - Automated Testing
# This is like kochiku.yml at Square - it tells GitHub how to test your code

name: Run Tests

# When should this run?
on:
  push:
    branches: [ main ]  # Run when code is pushed to main branch
  pull_request:
    branches: [ main ]  # Run when someone creates a pull request

# What jobs should run?
jobs:
  test:
    name: Test Calculator App
    runs-on: ubuntu-latest  # Use a Ubuntu Linux computer
    
    steps:
    # Step 1: Get the code
    - name: Checkout code
      uses: actions/checkout@v3
    
    # Step 2: Set up Python
    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    # Step 3: Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    # Step 4: Run the tests
    - name: Run tests with pytest
      run: |
        pytest test_calculator.py -v --tb=short
    
    # Step 5: Run the calculator app (just to show it works)
    - name: Run calculator app
      run: |
        python calculator.py
